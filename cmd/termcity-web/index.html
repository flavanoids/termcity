<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TermCity — 911 Incident Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1a2e;--sidebar:#16213e;--border:#0f3460;
  --text:#e0e0e0;--dim:#888;--accent:#e94560;
  --fire:#FF4444;--police:#4488FF;--ems:#EEEEEE;
}
body{font-family:'SF Mono','Fira Code','Consolas',monospace;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--sidebar);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
header h1{font-size:16px;color:var(--accent);white-space:nowrap}
header .info{font-size:12px;color:var(--dim);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.tabs{display:flex;gap:2px}
.tab{padding:6px 12px;border:1px solid var(--border);border-bottom:none;border-radius:4px 4px 0 0;background:transparent;color:var(--dim);cursor:pointer;font-family:inherit;font-size:12px;transition:all .2s}
.tab.active{background:var(--border);color:var(--text)}
.tab:hover{color:var(--text)}
#sidebar-toggle{display:none;margin-left:auto;padding:6px 12px;border:1px solid var(--border);border-radius:4px;background:var(--border);color:var(--text);cursor:pointer;font-family:inherit;font-size:12px}
.main{flex:1;display:flex;overflow:hidden;position:relative}
#map{flex:1;min-width:0}
.sidebar{width:300px;background:var(--sidebar);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:transform .3s ease}
.sidebar-header{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-header h2{font-size:13px;color:var(--accent)}
.sidebar-header .count{font-size:11px;color:var(--dim)}
.incident-list{flex:1;overflow-y:auto;padding:4px 0;-webkit-overflow-scrolling:touch}
.incident-list::-webkit-scrollbar{width:4px}
.incident-list::-webkit-scrollbar-track{background:var(--sidebar)}
.incident-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.incident{padding:10px 12px;border-bottom:1px solid rgba(15,52,96,.4);cursor:pointer;transition:background .15s;position:relative}
.incident:hover{background:rgba(15,52,96,.6)}
.incident .row1{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600}
.incident .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;animation:pulse 4s ease-in-out infinite}
.incident .row2{font-size:12px;color:var(--dim);margin-top:3px;padding-left:16px;display:flex;justify-content:space-between;align-items:center}
.incident .age-badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.incident .age-new{background:#22c55e;color:#000}
.incident .age-recent{background:#eab308;color:#000}
.incident .age-stale{background:#f97316;color:#fff}
.incident .age-old{background:#ef4444;color:#fff}
.incident .time-bar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:6px;overflow:hidden}
.incident .time-bar-fill{height:100%;background:linear-gradient(90deg,#22c55e,#eab308,#f97316,#ef4444);border-radius:2px;transition:width .3s}
.incident .time-dot{width:8px;height:8px;border-radius:50%;margin-right:4px;display:inline-block}
.incident.age-new-indicator{border-left:3px solid #22c55e}
.incident.age-recent-indicator{border-left:3px solid #eab308}
.incident.age-stale-indicator{border-left:3px solid #f97316}
.incident.age-old-indicator{border-left:3px solid #ef4444}
.history-controls{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.history-controls .btn{padding:6px 14px;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--dim);cursor:pointer;font-family:inherit;font-size:12px;transition:all .15s;touch-action:manipulation}
.history-controls .btn.active{background:var(--border);color:var(--text)}
.history-controls .btn:hover{color:var(--text)}
.btn-danger{border-color:var(--accent)!important;color:var(--accent)!important}
.btn-danger:hover{background:var(--accent)!important;color:#fff!important}
.status-bar{background:var(--border);padding:6px 16px;font-size:11px;color:var(--dim);display:flex;gap:16px;flex-shrink:0;flex-wrap:wrap}
.status-bar span{white-space:nowrap}
.empty{padding:24px 12px;text-align:center;color:var(--dim);font-size:13px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999}
.sidebar-close{display:none;position:absolute;top:8px;right:12px;font-size:20px;color:var(--dim);cursor:pointer;padding:4px;z-index:1001}
@keyframes pulse{
  0%,100%{opacity:.45;transform:scale(.85)}
  50%{opacity:1;transform:scale(1.15)}
}
@keyframes map-pulse{
  0%,100%{r:8;opacity:.45;stroke-width:3}
  50%{r:12;opacity:1;stroke-width:1}
}
.leaflet-container{background:var(--bg)!important}
.leaflet-popup-content-wrapper{background:var(--sidebar);color:var(--text);border:1px solid var(--border)}
.leaflet-popup-tip{background:var(--sidebar)}
.user-location-btn{margin-left:auto;padding:6px 12px;border:1px solid var(--border);border-radius:4px;background:var(--border);color:var(--text);cursor:pointer;font-family:inherit;font-size:12px;display:flex;align-items:center;gap:6px}
.user-location-btn:hover{background:var(--accent)}
.user-location-btn.active{background:var(--accent);color:#fff}
.user-location-icon{width:12px;height:12px;border-radius:50%;background:#4488FF;box-shadow:0 0 8px #4488FF;animation:userPulse 2s ease-in-out infinite}
@keyframes userPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:0.6}}
@media (max-width:768px){
  header{padding:8px 12px}
  header h1{font-size:14px}
  header .info{font-size:11px}
  .tab{padding:6px 10px;font-size:11px}
  #sidebar-toggle{display:block}
  .main{position:relative}
  .sidebar{position:fixed;right:0;top:0;bottom:0;width:85%;max-width:320px;z-index:1000;-webkit-transform:translateX(100%);transform:translateX(100%);border-left:none;border-top:1px solid var(--border);-webkit-transition:-webkit-transform .3s ease;transition:transform .3s ease}
  .sidebar.open{-webkit-transform:translateX(0);transform:translateX(0)}
  .sidebar-overlay{display:block;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:999;opacity:0;pointer-events:none;-webkit-transition:opacity .3s;transition:opacity .3s}
  .sidebar-overlay.open{opacity:1;pointer-events:auto}
  .sidebar-close{display:block;position:absolute;top:8px;right:12px;font-size:24px;color:var(--dim);cursor:pointer;padding:8px;z-index:1001;-webkit-tap-highlight-color:transparent}
  .incident{padding:14px;-webkit-tap-highlight-color:rgba(15,52,96,.3)}
  .incident .row1{font-size:15px}
  .incident .row2{font-size:13px}
  .status-bar{font-size:12px;padding:10px 12px}
  .status-bar span{white-space:normal}
  #map{width:100%!important}
}
</style>
</head>
<body>

<header>
  <h1>TermCity</h1>
  <span class="info" id="location"></span>
  <div class="tabs">
    <button class="tab active" data-tab="live" onclick="switchTab('live')">Live</button>
    <button class="tab" data-tab="history" onclick="switchTab('history')">History</button>
  </div>
  <button class="user-location-btn" id="locate-btn" onclick="requestLocation()" title="Get my location">
    <span id="locate-dot" style="display:none" class="user-location-icon"></span>
    <span id="locate-text">📍</span>
  </button>
  <button id="sidebar-toggle" onclick="toggleSidebar()">☰</button>
</header>

<div class="main">
  <div class="sidebar-overlay" onclick="closeSidebar()"></div>
  <div id="map"></div>
  <div class="sidebar">
    <span class="sidebar-close" onclick="closeSidebar()">×</span>
    <div id="live-panel">
      <div class="sidebar-header">
        <h2>ACTIVE INCIDENTS</h2>
        <span class="count" id="live-count"></span>
      </div>
      <div class="incident-list" id="live-list"></div>
    </div>
    <div id="history-panel" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <div class="sidebar-header">
        <h2>INCIDENT HISTORY</h2>
        <span class="count" id="history-count"></span>
      </div>
      <div class="history-controls">
        <button class="btn active" data-days="1" onclick="setHistoryDays(1)">24h</button>
        <button class="btn" data-days="3" onclick="setHistoryDays(3)">3 Days</button>
        <button class="btn" data-days="7" onclick="setHistoryDays(7)">7 Days</button>
        <button class="btn btn-danger" onclick="clearHistory()">Clear</button>
      </div>
      <div class="incident-list" id="history-list"></div>
    </div>
  </div>
</div>

<div class="status-bar">
  <span id="status-poll">Last poll: —</span>
  <span id="status-stats"></span>
</div>

<script>
const map_ = L.map('map',{zoomControl:false}).setView([0,0],14);
L.control.zoom({position:'topright'}).addTo(map_);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OSM &copy; CARTO',maxZoom:19
}).addTo(map_);

let liveMarkers=L.layerGroup().addTo(map_);
let historyMarkers=L.layerGroup();
let currentTab='live';
let historyDays=1;
let centered=false;

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.getElementById('live-panel').style.display=tab==='live'?'':'none';
  const hp=document.getElementById('history-panel');
  hp.style.display=tab==='history'?'flex':'none';
  if(tab==='live'){
    map_.removeLayer(historyMarkers);
    liveMarkers.addTo(map_);
  }else{
    map_.removeLayer(liveMarkers);
  }
}

function toggleSidebar(){
  const sidebar=document.querySelector('.sidebar');
  const overlay=document.querySelector('.sidebar-overlay');
  const isOpen=sidebar.classList.contains('open');
  if(isOpen){
    closeSidebar();
  }else{
    sidebar.classList.add('open');
    overlay.classList.add('open');
  }
}

function closeSidebar(){
  document.querySelector('.sidebar').classList.remove('open');
  document.querySelector('.sidebar-overlay').classList.remove('open');
}

// Auto-close sidebar when clicking an incident on mobile
function incidentClicked(inc){
  map_.setView([inc.lat,inc.lng],16);
  if(window.innerWidth<=768){
    closeSidebar();
  }
}

function setHistoryDays(d){
  historyDays=d;
  document.querySelectorAll('.history-controls .btn[data-days]').forEach(b=>
    b.classList.toggle('active',parseInt(b.dataset.days)===d));
  fetchHistory();
}

function clearHistory(){
  if(!confirm('Clear all incident history?'))return;
  fetch('/api/history/clear',{method:'POST'}).then(()=>fetchHistory());
}

function getAgeColor(minutes){
  if(minutes<15)return'#22c55e';//NEW-green
  if(minutes<60)return'#eab308';//RECENT-yellow
  if(minutes<240)return'#f97316';//STALE-orange
  return'#ef4444';//OLD-red
}

function getIncidentIconSVG(type,ageMinutes){
  const fillColor=getAgeColor(ageMinutes);

  if(type.toLowerCase()==='ems'){
    // Clean ambulance icon - red outline, age-colored fill
    return`<svg viewBox="0 0 24 24" width="26" height="26" style="filter:drop-shadow(0 2px 3px rgba(0,0,0,0.4))">
      <rect x="2" y="7" width="20" height="10" rx="2" fill="${fillColor}" fill-opacity="0.85" stroke="#FF4444" stroke-width="1.5"/>
      <path d="M5 10h3v4H5z" fill="#fff" fill-opacity="0.9"/>
      <path d="M17 10h2v4h-2z" fill="#fff" fill-opacity="0.9"/>
      <path d="M12 9v4M10 11h4" stroke="#FF4444" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="6.5" cy="16" r="1.5" fill="#222"/>
      <circle cx="17.5" cy="16" r="1.5" fill="#222"/>
    </svg>`;
  }

  if(type.toLowerCase()==='fire'){
    // Clean fire truck icon - red outline, age-colored fill
    return`<svg viewBox="0 0 24 24" width="26" height="26" style="filter:drop-shadow(0 2px 3px rgba(0,0,0,0.4))">
      <rect x="2" y="6" width="20" height="12" rx="2" fill="${fillColor}" fill-opacity="0.85" stroke="#FF4444" stroke-width="1.5"/>
      <rect x="4" y="8" width="4" height="3" fill="#fff" fill-opacity="0.9"/>
      <rect x="9" y="8" width="4" height="3" fill="#fff" fill-opacity="0.9"/>
      <rect x="15" y="8" width="5" height="5" fill="#fff" fill-opacity="0.9"/>
      <circle cx="6.5" cy="17" r="1.5" fill="#222"/>
      <circle cx="17.5" cy="17" r="1.5" fill="#222"/>
    </svg>`;
  }

  // Clean police car icon - blue outline, age-colored fill
  return`<svg viewBox="0 0 24 24" width="26" height="26" style="filter:drop-shadow(0 2px 3px rgba(0,0,0,0.4))">
    <path d="M4 16 L6.5 8 L17.5 8 L20 16 Z" fill="${fillColor}" fill-opacity="0.85" stroke="#4488FF" stroke-width="1.5"/>
    <rect x="7" y="9" width="4" height="3" fill="#fff" fill-opacity="0.9"/>
    <rect x="12" y="9" width="4" height="3" fill="#fff" fill-opacity="0.9"/>
    <rect x="9" y="5" width="6" height="2" rx="1" fill="#4488FF"/>
    <circle cx="7" cy="16" r="1.5" fill="#222"/>
    <circle cx="17" cy="16" r="1.5" fill="#222"/>
  </svg>`;
}

function makeIcon(type,incidentTime){
  const ageMinutes=incidentTime?(Date.now()-new Date(incidentTime).getTime())/60000:9999;
  const svg=getIncidentIconSVG(type,ageMinutes);
  return L.divIcon({
    className:'',
    html:`<div style="width:30px;height:30px;display:flex;align-items:center;justify-content:center">${svg}</div>`,
    iconSize:[30,30],iconAnchor:[15,15]
  });
}

function makeHistoryIcon(type,incidentTime){
  const ageMinutes=incidentTime?(Date.now()-new Date(incidentTime).getTime())/60000:9999;
  const svg=getIncidentIconSVG(type,ageMinutes);
  return L.divIcon({
    className:'',
    html:`<div style="width:22px;height:22px;display:flex;align-items:center;justify-content:center;opacity:0.7">${svg}</div>`,
    iconSize:[22,22],iconAnchor:[11,11]
  });
}

function getAgeCategory(incidentTime){
  if(!incidentTime)return{label:'UNKNOWN',class:'age-old',indicator:'age-old-indicator',minutes:9999};
  const ageMinutes=(Date.now()-new Date(incidentTime).getTime())/60000;
  if(ageMinutes<15)return{label:'NEW',class:'age-new',indicator:'age-new-indicator',minutes:ageMinutes};
  if(ageMinutes<60)return{label:'RECENT',class:'age-recent',indicator:'age-recent-indicator',minutes:ageMinutes};
  if(ageMinutes<240)return{label:'STALE',class:'age-stale',indicator:'age-stale-indicator',minutes:ageMinutes};
  return{label:'OLD',class:'age-old',indicator:'age-old-indicator',minutes:ageMinutes};
}

function renderList(containerId,incidents,isHistory){
  const el=document.getElementById(containerId);
  if(!incidents||incidents.length===0){
    el.innerHTML='<div class="empty">No incidents</div>';
    return;
  }
  const now=Date.now();
  const items=incidents.map((inc,i)=>{
    const age=getAgeCategory(inc.time);
    // Calculate progress bar width (decays over 2 hours)
    const ageHours=age.minutes/60;
    const freshnessPercent=Math.max(0,Math.min(100,100-(ageHours/2)*100));
    const timeBarWidth=`${freshnessPercent}%`;
    // Time dot color based on age
    const timeDotColor=age.minutes<15?'#22c55e':age.minutes<60?'#eab308':age.minutes<240?'#f97316':'#ef4444';
    return `<div class="incident ${age.indicator}" onclick="map_.setView([${inc.lat},${inc.lng}],16);if(window.innerWidth<=768)closeSidebar();">
      <div class="row1">
        <span class="dot" style="background:${inc.color}"></span>
        <span>${i+1}. ${esc(inc.title)}</span>
      </div>
      <div class="row2">
        <span>${esc(inc.address)}</span>
        <span class="age-badge ${age.class}">${age.label}</span>
      </div>
      <div class="row2" style="margin-top:4px;font-size:11px">
        <span style="display:flex;align-items:center"><span class="time-dot" style="background:${timeDotColor}"></span>${esc(inc.ago||inc.time)}</span>
      </div>
      <div class="time-bar"><div class="time-bar-fill" style="width:${timeBarWidth}"></div></div>
    </div>`;
  });
  el.innerHTML=items.join('');
}

function esc(s){
  if(!s)return'';
  const d=document.createElement('div');d.textContent=s;return d.innerHTML;
}

function fetchLive(){
  fetch('/api/incidents').then(r=>r.json()).then(d=>{
    if(!centered&&d.lat&&d.lng){map_.setView([d.lat,d.lng],14);centered=true}
    document.getElementById('location').textContent=`${d.city||''} — ${d.zip||''}`;
    const incs=d.incidents||[];
    document.getElementById('live-count').textContent=incs.length+' active';
    if(currentTab==='live'){
      renderList('live-list',incs,false);
      liveMarkers.clearLayers();
      incs.forEach(inc=>{
        L.marker([inc.lat,inc.lng],{icon:makeIcon(inc.type,inc.time)})
          .bindPopup(`<b>${esc(inc.title)}</b><br>${esc(inc.address)}<br><small>${inc.time} — ${inc.source}</small>`)
          .addTo(liveMarkers);
      });
    }
    document.getElementById('status-poll').textContent='Last poll: '+new Date(d.last_poll).toLocaleTimeString();
  }).catch(()=>{});
}

function fetchHistory(){
  fetch(`/api/history?days=${historyDays}`).then(r=>r.json()).then(d=>{
    const incs=d.incidents||[];
    document.getElementById('history-count').textContent=incs.length+' events ('+d.days+'d)';
    renderList('history-list',incs,true);
    historyMarkers.clearLayers();
    incs.forEach(inc=>{
      L.marker([inc.lat,inc.lng],{icon:makeHistoryIcon(inc.type,inc.time)})
        .bindPopup(`<b>${esc(inc.title)}</b><br>${esc(inc.address)}<br><small>${inc.time} — ${inc.source}</small>`)
        .addTo(historyMarkers);
    });
  }).catch(()=>{});
}

function fetchStats(){
  fetch('/api/status').then(r=>r.json()).then(d=>{
    document.getElementById('status-stats').textContent=
      `History: ${d.history_1d} (24h) / ${d.history_3d} (3d) / ${d.history_7d} (7d)`;
  }).catch(()=>{});
}

fetchLive();
fetchStats();
setInterval(fetchLive,60000);
setInterval(fetchStats,60000);

// Geolocation and user tracking
let userMarker=null;
let userPosition=null;
let watchId=null;

function requestLocation(){
  if(!navigator.geolocation){
    alert('Geolocation is not supported by your browser');
    return;
  }

  // Check if running on HTTP (not HTTPS) - iOS Safari blocks geolocation on HTTP
  if(location.protocol!=='https:'&&location.hostname!=='localhost'&&location.hostname!=='127.0.0.1'){
    showLocationDialog();
    return;
  }

  const btn=document.getElementById('locate-btn');
  btn.classList.add('active');
  document.getElementById('locate-text').textContent='Locating...';

  navigator.geolocation.getCurrentPosition(
    pos=>{
      const lat=pos.coords.latitude;
      const lng=pos.coords.longitude;
      userPosition={lat,lng};
      localStorage.setItem('termcity_user_location',JSON.stringify({lat,lng,ts:Date.now()}));
      updateUserMarker();
      map_.setView([lat,lng],14);
      centered=true;
      document.getElementById('locate-text').textContent='📍';
      document.getElementById('locate-dot').style.display='inline-block';
      // Start watching position for updates
      if(!watchId){
        watchId=navigator.geolocation.watchPosition(
          p=>{userPosition={lat:p.coords.latitude,lng:p.coords.longitude};updateUserMarker();},
          ()=>{},
          {enableHighAccuracy:true,timeout:10000,maximumAge:30000}
        );
      }
    },
    err=>{
      btn.classList.remove('active');
      document.getElementById('locate-text').textContent='📍';
      let msg='Unable to get location';
      if(err.code===1){
        // Permission denied - might be previous denial
        showLocationDialog();
        return;
      }
      else if(err.code===2)msg='Location unavailable';
      else if(err.code===3)msg='Location timeout';
      alert(msg);
    },
    {enableHighAccuracy:true,timeout:10000,maximumAge:60000}
  );
}

function showLocationDialog(){
  const zip=prompt('Enter your ZIP code to set location:');
  if(zip&&zip.length===5&&!isNaN(zip)){
    // Geocode the zip using the API
    fetch(`https://nominatim.openstreetmap.org/search?postalcode=${zip}&country=US&format=json&limit=1`,{
      headers:{'User-Agent':'termcity/1.0'}
    }).then(r=>r.json()).then(data=>{
      if(data&&data.length>0){
        const lat=parseFloat(data[0].lat);
        const lng=parseFloat(data[0].lon);
        userPosition={lat,lng};
        localStorage.setItem('termcity_user_location',JSON.stringify({lat,lng,ts:Date.now(),zip:zip}));
        updateUserMarker();
        map_.setView([lat,lng],14);
        centered=true;
        document.getElementById('locate-btn').classList.add('active');
        document.getElementById('locate-dot').style.display='inline-block';
        document.getElementById('location').textContent=zip;
      }else{
        alert('ZIP code not found');
      }
    }).catch(()=>alert('Error looking up ZIP code'));
  }else if(zip){
    alert('Please enter a valid 5-digit ZIP code');
  }
}

function updateUserMarker(){
  if(!userPosition)return;
  if(userMarker)map_.removeLayer(userMarker);
  const icon=L.divIcon({
    className:'',
    html:`<div style="width:20px;height:20px;border-radius:50%;background:#4488FF;border:3px solid white;box-shadow:0 0 12px #4488FF,0 0 20px #4488FF;animation:userPulse 2s ease-in-out infinite;position:relative">
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;background:white;border-radius:50%"></div>
    </div>`,
    iconSize:[20,20],iconAnchor:[10,10]
  });
  userMarker=L.marker([userPosition.lat,userPosition.lng],{icon:icon,zIndexOffset:1000}).addTo(map_);
  userMarker.bindPopup('<b>You are here</b>').openPopup();
}

// Check for saved location on load
function restoreSavedLocation(){
  const saved=localStorage.getItem('termcity_user_location');
  if(saved){
    try{
      const data=JSON.parse(saved);
      if(Date.now()-data.ts<7*24*60*60*1000){// Within 7 days
        userPosition={lat:data.lat,lng:data.lng};
        updateUserMarker();
        map_.setView([data.lat,data.lng],14);
        centered=true;
        document.getElementById('locate-dot').style.display='inline-block';
        document.getElementById('locate-btn').classList.add('active');
        if(data.zip){
          document.getElementById('location').textContent=data.zip;
        }
        return true;
      }
    }catch(e){}
  }
  return false;
}

// Try to restore saved location, otherwise fall back to server location
setTimeout(()=>{
  if(!restoreSavedLocation()){
    // Will use server default location from fetchLive
  }
},500);
</script>
