<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TermCity — 911 Incident Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1a2e;--sidebar:#16213e;--border:#0f3460;
  --text:#e0e0e0;--dim:#888;--accent:#e94560;
  --fire:#FF4444;--police:#4488FF;--ems:#EEEEEE;
}
body{font-family:'SF Mono','Fira Code','Consolas',monospace;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--sidebar);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:16px;flex-shrink:0}
header h1{font-size:16px;color:var(--accent);white-space:nowrap}
header .info{font-size:12px;color:var(--dim)}
.tabs{display:flex;gap:2px;margin-left:auto}
#refresh-btn{background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--dim);cursor:pointer;font-size:15px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;transition:color .2s,border-color .2s;flex-shrink:0;line-height:1}
#refresh-btn:hover:not(:disabled){color:var(--text);border-color:var(--text)}
#refresh-btn:disabled{opacity:.4;cursor:default}
#refresh-btn.spinning{color:var(--accent);border-color:var(--accent);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tab{padding:6px 16px;border:1px solid var(--border);border-bottom:none;border-radius:4px 4px 0 0;background:transparent;color:var(--dim);cursor:pointer;font-family:inherit;font-size:12px;transition:all .2s}
.tab.active{background:var(--border);color:var(--text)}
.tab:hover{color:var(--text)}
.main{flex:1;display:flex;overflow:hidden}
#map{flex:1}
.sidebar{width:300px;background:var(--sidebar);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar-header{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-header h2{font-size:13px;color:var(--accent)}
.sidebar-header .count{font-size:11px;color:var(--dim)}
.incident-list{flex:1;overflow-y:auto;padding:4px 0}
.incident-list::-webkit-scrollbar{width:4px}
.incident-list::-webkit-scrollbar-track{background:var(--sidebar)}
.incident-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.incident{padding:8px 12px;border-bottom:1px solid rgba(15,52,96,.4);cursor:pointer;transition:background .15s}
.incident:hover{background:rgba(15,52,96,.6)}
.incident .row1{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
.incident .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pulse 4s ease-in-out infinite}
.incident .row2{font-size:11px;color:var(--dim);margin-top:2px;padding-left:14px;display:flex;justify-content:space-between}
.history-controls{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.history-controls .btn{padding:4px 12px;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--dim);cursor:pointer;font-family:inherit;font-size:11px;transition:all .15s}
.history-controls .btn.active{background:var(--border);color:var(--text)}
.history-controls .btn:hover{color:var(--text)}
.btn-danger{border-color:var(--accent)!important;color:var(--accent)!important}
.btn-danger:hover{background:var(--accent)!important;color:#fff!important}
.status-bar{background:var(--border);padding:4px 16px;font-size:11px;color:var(--dim);display:flex;gap:16px;flex-shrink:0}
.status-bar span{white-space:nowrap}
.empty{padding:24px 12px;text-align:center;color:var(--dim);font-size:12px}
@keyframes pulse{
  0%,100%{opacity:.45;transform:scale(.85)}
  50%{opacity:1;transform:scale(1.15)}
}
/* Vehicle marker light animations */
.vm{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer}
.vm-fire{animation:flash-fire .8s ease-in-out infinite}
.vm-ems{animation:flash-ems .65s ease-in-out infinite}
.vm-police{animation:flash-police .45s steps(1) infinite}
@keyframes flash-fire{
  0%,100%{box-shadow:0 0 0 3px rgba(255,68,68,.85),0 0 14px 5px rgba(255,68,68,.5)}
  50%{box-shadow:0 0 0 3px rgba(255,140,0,.9),0 0 18px 7px rgba(255,140,0,.6)}
}
@keyframes flash-ems{
  0%,100%{box-shadow:0 0 0 3px rgba(255,68,68,.85),0 0 14px 5px rgba(255,68,68,.5)}
  50%{box-shadow:0 0 0 3px rgba(238,238,238,.9),0 0 18px 7px rgba(238,238,238,.4)}
}
@keyframes flash-police{
  0%,49%{box-shadow:0 0 0 3px rgba(68,136,255,.9),0 0 14px 5px rgba(68,136,255,.6)}
  50%,100%{box-shadow:0 0 0 3px rgba(255,68,68,.9),0 0 14px 5px rgba(255,68,68,.6)}
}
.vm-hist{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;opacity:.65}
.leaflet-container{background:var(--bg)!important}
</style>
</head>
<body>

<header>
  <h1>TermCity</h1>
  <span class="info" id="location"></span>
  <button id="refresh-btn" title="Refresh incidents" onclick="doRefresh()">⟳</button>
  <div class="tabs">
    <button class="tab active" data-tab="live" onclick="switchTab('live')">Live</button>
    <button class="tab" data-tab="history" onclick="switchTab('history')">History</button>
  </div>
</header>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div id="live-panel">
      <div class="sidebar-header">
        <h2>ACTIVE INCIDENTS</h2>
        <span class="count" id="live-count"></span>
      </div>
      <div class="incident-list" id="live-list"></div>
    </div>
    <div id="history-panel" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <div class="sidebar-header">
        <h2>INCIDENT HISTORY</h2>
        <span class="count" id="history-count"></span>
      </div>
      <div class="history-controls">
        <button class="btn active" data-days="1" onclick="setHistoryDays(1)">24h</button>
        <button class="btn" data-days="3" onclick="setHistoryDays(3)">3 Days</button>
        <button class="btn" data-days="7" onclick="setHistoryDays(7)">7 Days</button>
        <button class="btn btn-danger" onclick="clearHistory()">Clear</button>
      </div>
      <div class="incident-list" id="history-list"></div>
    </div>
  </div>
</div>

<div class="status-bar">
  <span id="status-poll">Last poll: —</span>
  <span id="status-stats"></span>
</div>

<script>
const map_ = L.map('map',{zoomControl:false}).setView([0,0],14);
L.control.zoom({position:'topright'}).addTo(map_);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OSM &copy; CARTO',maxZoom:19
}).addTo(map_);

let liveMarkers=L.layerGroup().addTo(map_);
let historyMarkers=L.layerGroup();
let currentTab='live';
let historyDays=1;
let centered=false;

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.getElementById('live-panel').style.display=tab==='live'?'':'none';
  const hp=document.getElementById('history-panel');
  hp.style.display=tab==='history'?'flex':'none';
  if(tab==='live'){
    map_.removeLayer(historyMarkers);
    liveMarkers.addTo(map_);
  }else{
    map_.removeLayer(liveMarkers);
    historyMarkers.addTo(map_);
    fetchHistory();
  }
}

function setHistoryDays(d){
  historyDays=d;
  document.querySelectorAll('.history-controls .btn[data-days]').forEach(b=>
    b.classList.toggle('active',parseInt(b.dataset.days)===d));
  fetchHistory();
}

function clearHistory(){
  if(!confirm('Clear all incident history?'))return;
  fetch('/api/history/clear',{method:'POST'}).then(()=>fetchHistory());
}

function vehicleEmoji(type){
  switch(type){
    case 'fire':   return '🚒';
    case 'police': return '🚔';
    case 'ems':    return '🚑';
    default:       return '🚨';
  }
}

function makeIcon(type){
  const emoji=vehicleEmoji(type);
  return L.divIcon({
    className:'',
    html:`<div class="vm vm-${type||'ems'}">${emoji}</div>`,
    iconSize:[36,36],iconAnchor:[18,18]
  });
}

function makeHistoryIcon(type){
  const emoji=vehicleEmoji(type);
  return L.divIcon({
    className:'',
    html:`<div class="vm-hist">${emoji}</div>`,
    iconSize:[26,26],iconAnchor:[13,13]
  });
}

function renderList(containerId,incidents){
  const el=document.getElementById(containerId);
  if(!incidents||incidents.length===0){
    el.innerHTML='<div class="empty">No incidents</div>';
    return;
  }
  el.innerHTML=incidents.map((inc,i)=>`
    <div class="incident" onclick="map_.setView([${inc.lat},${inc.lng}],16)">
      <div class="row1">
        <span style="font-size:14px;line-height:1">${vehicleEmoji(inc.type)}</span>
        <span>${i+1}. ${esc(inc.title)}</span>
      </div>
      <div class="row2">
        <span>${esc(inc.address)}</span>
        <span>${esc(inc.ago||inc.time)}</span>
      </div>
    </div>`).join('');
}

function esc(s){
  if(!s)return'';
  const d=document.createElement('div');d.textContent=s;return d.innerHTML;
}

function applyLiveData(d){
  if(!centered&&d.lat&&d.lng){map_.setView([d.lat,d.lng],14);centered=true}
  document.getElementById('location').textContent=`${d.city||''} — ${d.zip||''}`;
  const incs=d.incidents||[];
  document.getElementById('live-count').textContent=incs.length+' active';
  if(currentTab==='live'){
    renderList('live-list',incs);
    liveMarkers.clearLayers();
    incs.forEach(inc=>{
      L.marker([inc.lat,inc.lng],{icon:makeIcon(inc.type)})
        .bindPopup(`<b>${esc(inc.title)}</b><br>${esc(inc.address)}<br><small>${inc.time} — ${inc.source}</small>`)
        .addTo(liveMarkers);
    });
  }
  document.getElementById('status-poll').textContent='Last poll: '+new Date(d.last_poll).toLocaleTimeString();
}

function fetchLive(){
  fetch('/api/incidents').then(r=>r.json()).then(applyLiveData).catch(()=>{});
}

function doRefresh(){
  const btn=document.getElementById('refresh-btn');
  if(btn.classList.contains('spinning'))return;
  btn.classList.add('spinning');
  btn.disabled=true;
  fetch('/api/refresh',{method:'POST'}).then(r=>{
    if(!r.ok)throw new Error(r.status);
    return r.json();
  }).then(d=>{
    applyLiveData(d);
    if(currentTab==='history')fetchHistory();
    fetchStats();
  }).catch(()=>{}).finally(()=>{
    btn.classList.remove('spinning');
    btn.disabled=false;
  });
}

function fetchHistory(){
  fetch(`/api/history?days=${historyDays}`).then(r=>r.json()).then(d=>{
    const incs=d.incidents||[];
    document.getElementById('history-count').textContent=incs.length+' events ('+d.days+'d)';
    renderList('history-list',incs);
    historyMarkers.clearLayers();
    incs.forEach(inc=>{
      L.marker([inc.lat,inc.lng],{icon:makeHistoryIcon(inc.type)})
        .bindPopup(`<b>${esc(inc.title)}</b><br>${esc(inc.address)}<br><small>${inc.time} — ${inc.source}</small>`)
        .addTo(historyMarkers);
    });
  }).catch(()=>{});
}

function fetchStats(){
  fetch('/api/status').then(r=>r.json()).then(d=>{
    document.getElementById('status-stats').textContent=
      `History: ${d.history_1d} (24h) / ${d.history_3d} (3d) / ${d.history_7d} (7d)`;
  }).catch(()=>{});
}

fetchLive();
fetchStats();
setInterval(fetchLive,60000);
setInterval(fetchStats,60000);
</script>
</body>
</html>
